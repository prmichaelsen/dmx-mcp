notes:
  - Hardware: Enttec USB-C DMX adapter (OLA-native support)
  - Backend: OLA REST API on localhost:9090
  - Transport: DMX512 via Enttec
  - Design docs: agent/design/local.dmx-lighting-mcp.md, agent/design/local.ola-hardware-setup-linux.md, agent/design/local.ola-hardware-setup-macos.md
  - Total estimated duration: ~6.5 weeks across 6 milestones
  - "NOTE: MVP implementation used a simplified API vs task docs. ProfileRegistry keys by id (not manufacturer+model), FixtureManager takes profileId (not profile object), validateProfile throws (not returns errors array)."

