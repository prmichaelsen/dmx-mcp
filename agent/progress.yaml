project:
  name: dmx-mcp
  version: 0.1.0
  type: mcp-server
  started: 2026-03-01
  status: in_progress
  description: |
    MCP server for programming and controlling DMX lighting shows via OLA.
    Provides high-level abstractions (fixtures, scenes, cues, effects) as MCP tools,
    translating agent commands to raw DMX values sent through OLA's REST API
    to an Enttec USB DMX adapter.

